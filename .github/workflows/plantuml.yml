name: PlantUML Diagrams

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml

      - name: Generate Diagrams
        run: |
          plantuml diagrams/context/*.puml
          plantuml diagrams/container/*.puml
          plantuml diagrams/component/*.puml
          plantuml diagrams/code/*.puml

      - name: Commit Diagrams
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "ststas@yandex.ru"
          git config --local user.name "Stas Zaitsev"
          git add diagrams/**/*.png
          if git diff --cached --quiet; then
            echo "No diagram changes to commit"
          else
            git commit -m "Automated diagram generation [skip ci]"
            git push origin HEAD:main
          fi
